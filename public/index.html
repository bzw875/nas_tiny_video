<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAS 视频管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
    }
    .header {
      background: #16213e;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }
    .header h1 {
      font-size: 1.5rem;
      color: #e94560;
    }
    .search-box {
      display: flex;
      gap: 0.5rem;
    }
    .search-box input {
      padding: 0.5rem 1rem;
      border: 1px solid #0f3460;
      border-radius: 4px;
      background: #1a1a2e;
      color: #fff;
      width: 300px;
    }
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #e94560;
      color: #fff;
    }
    .btn-primary:hover {
      background: #c73e54;
    }
    .btn-secondary {
      background: #0f3460;
      color: #fff;
    }
    .btn-secondary:hover {
      background: #1a4a7a;
    }
    .container {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .video-card {
      background: #16213e;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }
    .video-thumbnail {
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .video-thumbnail::before {
      content: '▶';
      font-size: 3rem;
      color: rgba(233, 69, 96, 0.8);
    }
    .video-info {
      padding: 1rem;
    }
    .video-title {
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .video-meta {
      font-size: 0.8rem;
      color: #888;
      display: flex;
      justify-content: space-between;
    }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
    }
    .page-btn {
      padding: 0.5rem 1rem;
      background: #16213e;
      border: 1px solid #0f3460;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    .page-btn:hover, .page-btn.active {
      background: #e94560;
      border-color: #e94560;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      width: 90%;
      max-width: 1200px;
      background: #16213e;
      border-radius: 8px;
      overflow: hidden;
    }
    .modal-header {
      padding: 1rem;
      background: #0f3460;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-close {
      font-size: 1.5rem;
      cursor: pointer;
      background: none;
      border: none;
      color: #fff;
    }
    .player-container {
      aspect-ratio: 16/9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .player-info {
      padding: 1rem;
    }
    .empty-state {
      text-align: center;
      padding: 4rem;
      color: #888;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>🎬 NAS 视频管理</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索视频...">
      <button class="btn btn-primary" onclick="searchVideos()">搜索</button>
    </div>
  </header>

  <div class="container">
    <div class="toolbar">
      <div>
        <button class="btn btn-primary" onclick="startCrawl()">
          <span id="crawlBtn">🔄 开始爬取</span>
        </button>
      </div>
      <div>
        <span id="totalCount">共 0 个视频</span>
      </div>
    </div>

    <div id="videoGrid" class="video-grid">
      <div class="empty-state">
        <p>暂无视频，点击"开始爬取"按钮从 SMB 服务器获取视频列表</p>
      </div>
    </div>

    <div id="pagination" class="pagination"></div>
  </div>

  <!-- Video Player Modal -->
  <div id="playerModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="playerTitle">视频播放</h3>
        <button class="modal-close" onclick="closePlayer()">&times;</button>
      </div>
      <div class="player-container">
        <video id="videoPlayer" controls style="width: 100%; height: 100%;">
          <source id="videoSource" src="" type="video/mp4">
          您的浏览器不支持视频播放
        </video>
      </div>
      <div class="player-info">
        <p id="playerInfo"></p>
      </div>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let currentSearch = '';

    // Load videos on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadVideos();
    });

    // Search input enter key
    document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchVideos();
      }
    });

    async function loadVideos(page = 1, search = '') {
      try {
        currentPage = page;
        currentSearch = search;

        const url = new URL('/api/videos', window.location.origin);
        url.searchParams.set('page', page.toString());
        url.searchParams.set('limit', '20');
        if (search) {
          url.searchParams.set('search', search);
        }

        const response = await fetch(url);
        const data = await response.json();

        renderVideos(data.videos);
        renderPagination(data.pagination);
        document.getElementById('totalCount').textContent = `共 ${data.pagination.total} 个视频`;
      } catch (error) {
        console.error('Error loading videos:', error);
        showError('加载视频失败');
      }
    }

    function renderVideos(videos) {
      const grid = document.getElementById('videoGrid');

      if (!videos || videos.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <p>暂无视频，点击"开始爬取"按钮从 SMB 服务器获取视频列表</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = videos.map(video => `
        <div class="video-card" onclick="playVideo(${video.id})">
          <div class="video-thumbnail"></div>
          <div class="video-info">
            <div class="video-title" title="${video.filename}">${video.filename}</div>
            <div class="video-meta">
              <span>${formatBytes(video.size)}</span>
              <span>${new Date(video.modifiedAt).toLocaleDateString()}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderPagination(pagination) {
      const { page, totalPages } = pagination;
      const container = document.getElementById('pagination');

      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }

      let html = '';

      // Previous button
      html += `<button class="page-btn" ${page === 1 ? 'disabled' : ''} onclick="loadVideos(${page - 1}, '${currentSearch}')">上一页</button>`;

      // Page numbers
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
          html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadVideos(${i}, '${currentSearch}')">${i}</button>`;
        } else if (i === page - 3 || i === page + 3) {
          html += `<span class="page-btn" style="cursor: default;">...</span>`;
        }
      }

      // Next button
      html += `<button class="page-btn" ${page === totalPages ? 'disabled' : ''} onclick="loadVideos(${page + 1}, '${currentSearch}')">下一页</button>`;

      container.innerHTML = html;
    }

    function searchVideos() {
      const search = document.getElementById('searchInput').value;
      loadVideos(1, search);
    }

    async function startCrawl() {
      const btn = document.getElementById('crawlBtn');
      btn.innerHTML = '<span class="loading"></span> 爬取中...';
      btn.disabled = true;

      try {
        const response = await fetch('/api/videos/crawl', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: '/' })
        });

        const data = await response.json();

        if (response.ok) {
          alert(`爬取完成！找到 ${data.found} 个视频，新增 ${data.saved} 个`);
          loadVideos(1);
        } else {
          throw new Error(data.error || '爬取失败');
        }
      } catch (error) {
        console.error('Error crawling:', error);
        alert('爬取失败: ' + error.message);
      } finally {
        btn.innerHTML = '🔄 开始爬取';
        btn.disabled = false;
      }
    }

    async function playVideo(id) {
      try {
        const response = await fetch(`/api/videos/${id}`);
        const video = await response.json();

        document.getElementById('playerTitle').textContent = video.filename;
        document.getElementById('playerInfo').textContent = `大小: ${formatBytes(video.size)} | 修改时间: ${new Date(video.modifiedAt).toLocaleString()}`;

        // Note: SMB streaming requires additional setup
        document.getElementById('videoSource').src = '';
        document.getElementById('videoPlayer').load();

        document.getElementById('playerModal').classList.add('active');
      } catch (error) {
        console.error('Error loading video:', error);
        alert('加载视频失败');
      }
    }

    function closePlayer() {
      document.getElementById('playerModal').classList.remove('active');
      document.getElementById('videoPlayer').pause();
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function showError(message) {
      const grid = document.getElementById('videoGrid');
      grid.innerHTML = `
        <div class="empty-state">
          <p style="color: #e94560;">${message}</p>
        </div>
      `;
    }

    // Close modal on outside click
    document.getElementById('playerModal')?.addEventListener('click', (e) => {
      if (e.target.id === 'playerModal') {
        closePlayer();
      }
    });
  </script>
</body>
</html>
