server:
  port: ${PORT:4000}

spring:
  application:
    name: video-manager-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:192.168.1.19}:3306/video_manager?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:}
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
  jackson:
    time-zone: Asia/Shanghai

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors-origin: ${CORS_ORIGIN:}
  novel-txt-dir: ${NOVEL_TXT_DIR:./txt}
